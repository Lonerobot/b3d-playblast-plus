schema_version = "1.0.0"

id = "playblast_plus"
version = "1.5.8"
name = "Playblast Plus"
tagline = "Viewport playblast capture with FFmpeg encoding"
maintainer = "Playblast Plus Contributors"
type = "add-on"

blender_version_min = "4.2.0"

tags = ["Render", "Pipeline"]

license = ["SPDX:GPL-3.0-or-later"]

[permissions]
files = "Read and write playblast output to disk"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  ".git",
  "*.zip",
  "*.pyc",
]
